name: User Journeys Team — UI Tests

on:
  push:
    paths:
      - 'features/ui/user-journeys-team/**'
      - 'steps/ui/user-journeys-team/**'
      - 'pages/user-journeys-team/**'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser engine'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.browser) || '["chromium","firefox","webkit"]') }}
    uses: ./.github/workflows/ui-tests-template.yml
    with:
      team: user-journeys-team
      browser: ${{ matrix.browser }}
    secrets:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_USER_NAME: ${{ secrets.TEST_USER_NAME }}
